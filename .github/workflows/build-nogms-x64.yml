name: build-nogms-x64

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Android command-line tools
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_HOME="$HOME/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl -L --fail \
            "https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip" \
            -o /tmp/cmdline-tools.zip
          rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          mkdir -p /tmp/cmdline-tools-unzip "$ANDROID_HOME/cmdline-tools/latest"
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-unzip
          cp -a /tmp/cmdline-tools-unzip/cmdline-tools/. "$ANDROID_HOME/cmdline-tools/latest/"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          {
            echo "$ANDROID_HOME/cmdline-tools/latest/bin"
            echo "$ANDROID_HOME/platform-tools"
          } >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build nogms debug APK
        shell: bash
        run: |
          set -euo pipefail
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > local.properties
          ./gradlew \
            --no-daemon \
            -Dorg.gradle.configuration-cache=false \
            -Dorg.gradle.jvmargs="-Xms256m -Xmx4096m -XX:+UseG1GC -Dfile.encoding=UTF-8" \
            :app:assembleNogmsProdDebug

      - uses: actions/upload-artifact@v4
        with:
          name: proton-pass-nogms-prod-debug-apk
          path: app/build/outputs/**/**/*.apk
          if-no-files-found: error
